spring:
  application:
    name: swingStockSelector

  main:
    headless: false
  datasource:
    url: jdbc:h2:file:./data/stockdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

python:
  service:
    baseUrl: http://localhost:8000
    username: user
    password: password

